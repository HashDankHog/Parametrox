<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Parametrox</title>
    <script async src="scripts/main.js"></script>
    <link href="styles/style.css" rel="stylesheet" />
</head>
<body>
    <div class="container" >
        <div class="header"  style="grid-area: hd" >
            <button>settings</button>
            <button>files</button>
            <button>save</button>
        </div>
        <div class="ribbon" style="grid-area: rb" >
            ribbon
        </div>
        <div class="workspace" style="grid-area: wk" >
            workspace
            <div class="workspace_buttons" >
                <button>Design</button>
                <button>Sketch</button>
                <button>Simulate</button>
                <button>Manufacture</button>
                <button>Assembly</button>
                <button>TBA</button>
            </div>
        </div>
        <div class="fileview" style="grid-area: fv" >
            <ul>
                <li>
                    folder1
                    <ul>
                        file
                    </ul>
                </li>
                <li>
                    folder2
                </li>
            </ul>
        </div>
        <div class="viewport" style="grid-area: vp" >
            viewport
            <canvas width="100" height="100" id="myCanvas"></canvas>
        </div>
        
        <div class="subviewport" style="grid-area: sv" >
            sub viewport
        </div>
        
        
    </div>
</body>
<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");
ctx.moveTo(0, 0);
ctx.lineTo(1200, 800);
ctx.stroke();
</script> 
</html>
