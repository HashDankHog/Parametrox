<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Parametrox</title>
    <script type="module" src="scripts/main.js"></script>
    <link href="styles/style.css" rel="stylesheet" />
</head>
<body>
    <div class="container" >
        <div class="header"  style="grid-area: hd" >
            <button id="plot">plot</button>
        </div>
        <div class="ribbon" style="grid-area: rb" >
        </div>
        <div class="workspace" style="grid-area: wk" >
            <h2>Workspace</h2>
            <div class="workspace_buttons" >
                <button>Design</button>
                <button>Sketch</button>
                <button>Simulate</button>
                <button>Manufacture</button>
                <button>Assembly</button>
                <button>TBA</button>
            </div>
        </div>
        <div class="fileview" style="grid-area: fv" >
            <ul>
                <li>
                    folder1
                    <ul>
                        file
                    </ul>
                </li>
                <li>
                    folder2
                </li>
            </ul>
        </div>
        <div class="viewport" style="grid-area: vp" >
            <canvas width="1000" height="1000" id="viewport_canvas"></canvas>
        </div>
        
        <div class="subviewport" style="grid-area: sv" >
            <iframe class="subFrame"></iframe>
        </div>
    
    <div id="window">
        <div id="windowHeader"><button id="windowClose">X</button></div>
        <iframe id="windowFrame"  src="window/parameter/parameter.html"></iframe>
    </div>
        
    </div>
</body>
</html>
